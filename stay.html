<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" type="text/css" href="style.css">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="color:white;background:black">

  <div id="container ">
    <p id="text">

    </p>
  </div>

  <p id="startCaption">[sound on]</p>

  <section id="start"></section>

  <audio style="display:none" controls preload="auto" id="clink" loop>
    <source src="" />
  </audio>

</body>
<script>
  let sound = document.getElementById('clink');
  let go = document.getElementById('start');
  let goCaption = document.getElementById('startCaption');
  let started = false;

  document.addEventListener('mouseover', function () {
    if (started == false) {
      started = true;
      setTimeout(() => {
        sound.play();
        goCaption.classList.add("fade");
      }, delay);
    }
  });

  //resize code
  let cont = document.getElementById('container');
  cont.style.height = window.innerHeight + "px";
  window.addEventListener('resize', function () {
    cont.style.height = window.innerHeight + "px";
  });

  //animate

  let allText;
  let p = document.getElementById('text');

  let speed = 1400;
  let delay = 2800;


  let winWidth;

  fetch("text.txt")
    .then(response => response.text())
    .then(data => {
      allText = data.split(/\W/);
      play(allText);

    });

  async function play(array) {
    await wait(delay);
    await animate(array);
  }

  async function animate(array) {
    let time;
    for (let i = 0; i < array.length; i++) {
      //this used to be a for loop in the window but it was glitchin
      await wait(speed);
      setText(array[i]);
    }
    await animate(array);
  }

  function setText(word) {
    winWidth = window.innerWidth;
    p.innerHTML = word;
    if (word.length > 3) {
      p.style.fontSize = winWidth / word.length + "px";
    }
  }

  function wait(time) {
    return new Promise(resolve => {
      setTimeout(() => {
        resolve('resolved');
      }, time);
    });
  }
  cont.style.height = window.innerHeight + "px";

  window.addEventListener('resize', function () {
    winWidth = window.innerWidth;
    cont.style.height = window.innerHeight + "px";
  });

</script>

</html>
